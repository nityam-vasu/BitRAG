<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BitRAG{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #4da6ff;
            --accent-hover: #3399ff;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --border: #2a2a4a;
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        
        .navbar {
            background-color: var(--bg-card) !important;
            border-bottom: 1px solid var(--border);
        }
        
        .navbar-brand {
            color: var(--accent) !important;
            font-weight: bold;
            font-size: 1.5rem;
        }
        
        .nav-link {
            color: var(--text-secondary) !important;
            transition: color 0.3s;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--accent) !important;
        }
        
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        
        .card-header {
            background-color: transparent;
            border-bottom: 1px solid var(--border);
            color: var(--accent);
            font-weight: 600;
        }
        
        .form-control, .form-select {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        
        .form-control:focus, .form-select:focus {
            background-color: var(--bg-input);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.2rem rgba(77, 166, 255, 0.25);
        }
        
        .btn-primary {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        
        .btn-outline-primary {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .btn-outline-primary:hover {
            background-color: var(--accent);
            color: #000;
        }
        
        .chat-message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            max-width: 85%;
        }
        
        .chat-user {
            background-color: var(--bg-input);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .chat-bot {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        
        .chat-system {
            background-color: rgba(255, 165, 0, 0.1);
            border: 1px solid rgba(255, 165, 0, 0.3);
            color: #ffa500;
            font-style: italic;
            text-align: center;
            max-width: 100%;
        }
        
        .chat-error {
            background-color: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }
        
        .chat-container {
            height: 60vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        .source-item {
            background-color: var(--bg-input);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .source-rank {
            color: var(--accent);
            font-weight: bold;
        }
        
        .source-score {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        
        .table {
            color: var(--text-primary);
        }
        
        .table > :not(caption) > * > * {
            background-color: transparent;
            border-color: var(--border);
        }
        
        .spinner-border {
            color: var(--accent);
        }
        
        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-online {
            background-color: #28a745;
        }
        
        .status-offline {
            background-color: #dc3545;
        }
        
        footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 15px 0;
            margin-top: auto;
        }
        
        .badge-model {
            background-color: var(--accent);
            color: #000;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-robot"></i> BitRAG
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-chat-dots"></i> Chat
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/documents' %}active{% endif %}" href="/documents">
                            <i class="bi bi-file-earmark-text"></i> Documents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                </ul>
                <span class="navbar-text" id="modelBadge">
                    <span class="badge badge-model">Loading...</span>
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container">
            <p class="mb-0 text-muted">
                BitRAG - Chat with your PDF documents using RAG
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load model badge on page load
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/settings')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('modelBadge').innerHTML = 
                        '<span class="badge badge-model"><i class="bi bi-cpu"></i> ' + data.model + '</span>';
                })
                .catch(() => {});
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
